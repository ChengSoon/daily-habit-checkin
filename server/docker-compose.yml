services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habit}
      POSTGRES_DB: ${POSTGRES_DB:-habit}
    volumes:
      - habit-db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8787
      DATABASE_URL: postgres://${POSTGRES_USER:-habit}:${POSTGRES_PASSWORD:-habit}@db:5432/${POSTGRES_DB:-habit}
      JWT_SECRET: ${JWT_SECRET:?set a strong secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      API_KEY: ${API_KEY:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
    expose:
      - "8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  habit-db:
  caddy-data:
  caddy-config:
