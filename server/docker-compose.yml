services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habit}
      POSTGRES_DB: ${POSTGRES_DB:-habit}
    volumes:
      - habit-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        # 国内服务器可在 .env 设置：
        # NODE_IMAGE=docker.m.daocloud.io/library/node:22-alpine
        # NPM_REGISTRY=https://registry.npmmirror.com
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: habit-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8787}
      # 未显式提供 DATABASE_URL 时，用 db 服务的 POSTGRES_* 分量自动拼出，
      # 连到内部网络里的 db:5432（与 db 服务的默认值保持一致）。
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-habit}:${POSTGRES_PASSWORD:-habit}@db:5432/${POSTGRES_DB:-habit}}
      JWT_SECRET: ${JWT_SECRET:?set a strong secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID:-}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY:-}
      TENCENT_ASR_REGION: ${TENCENT_ASR_REGION:-ap-guangzhou}
      TENCENT_ASR_ENGINE: ${TENCENT_ASR_ENGINE:-16k_zh}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      MIMO_TTS_BASE_URL: ${MIMO_TTS_BASE_URL:-https://api.xiaomimimo.com/v1}
      MIMO_TTS_MODEL: ${MIMO_TTS_MODEL:-mimo-v2.5-tts}
      MIMO_TTS_VOICE: ${MIMO_TTS_VOICE:-冰糖}
      MIMO_TTS_TIMEOUT_MS: ${MIMO_TTS_TIMEOUT_MS:-15000}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      API_KEY: ${API_KEY:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      # Cloudflare R2：图片 presigned 直传 + 公开域名直读所需凭据。
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      APP_UPDATE_MANIFEST_URL: ${APP_UPDATE_MANIFEST_URL:-}
    # 只接入 db 的内部网络 + 复用现有的 proxy_net，
    # 让 my-nginx 能用容器名 habit-app 反代过来；不对主机映射端口。
    networks:
      - default
      - proxy_net
    ports:
      - "${APP_PORT:-8787}:8787"

networks:
  proxy_net:
    external: true

volumes:
  habit-db:
