services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habit}
      POSTGRES_DB: ${POSTGRES_DB:-habit}
    volumes:
      - habit-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: habit-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8787
      DATABASE_URL: postgres://${POSTGRES_USER:-habit}:${POSTGRES_PASSWORD:-habit}@db:5432/${POSTGRES_DB:-habit}
      JWT_SECRET: ${JWT_SECRET:?set a strong secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      API_KEY: ${API_KEY:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      # Cloudflare R2：图片 presigned 直传 + 公开域名直读所需凭据。
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
    # 只接入 db 的内部网络 + 复用现有的 proxy_net，
    # 让 my-nginx 能用容器名 habit-app 反代过来；不对主机映射端口。
    networks:
      - default
      - proxy_net

networks:
  proxy_net:
    external: true

volumes:
  habit-db:
