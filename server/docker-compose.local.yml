# 本机 Docker 部署（不依赖外部 proxy_net）
# 用法：
#   cd server && docker compose -f docker-compose.local.yml --env-file .env up -d --build
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habit}
      POSTGRES_DB: ${POSTGRES_DB:-habit}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - habit-db-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: habit-app-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8787}
      # 强制走 compose 内部 db，忽略宿主机 .env 里可能存在的 DATABASE_URL
      DATABASE_URL: postgresql://${POSTGRES_USER:-habit}:${POSTGRES_PASSWORD:-habit}@db:5432/${POSTGRES_DB:-habit}
      JWT_SECRET: ${JWT_SECRET:?set a strong secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      API_KEY: ${API_KEY:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE: ${R2_PUBLIC_BASE:-}
      APP_UPDATE_MANIFEST_URL: ${APP_UPDATE_MANIFEST_URL:-}
    ports:
      - "${APP_PORT:-8787}:8787"

volumes:
  habit-db-local:
