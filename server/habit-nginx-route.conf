# my-nginx 路由：只把 /habit/api/ 与 /habit/health 反代到 habit-app 容器的 8787。
# 放到服务器 /opt/docker/nginx/conf.d/routes/30-habit.conf，然后 nginx -s reload。
# 不要代理整个 /habit/，否则会挡住 Web 端的 /habit/new 与 /habit/:id 页面。
location = /habit/health {
    proxy_pass http://habit-app:8787/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
}

# 末尾斜杠会把 /habit/api 前缀改写为 /api：
# /habit/api/auth/login -> 后端收到 /api/auth/login
location ^~ /habit/api/ {
    proxy_pass http://habit-app:8787/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
    client_max_body_size 12m;
}
