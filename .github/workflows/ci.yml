name: CI

# 客户端（Expo）与服务端（Express）的类型检查、测试、lint。
# 推送到任意分支或向 main 发 PR 时运行。
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client (Expo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          # node 24 自带 npm 11：package-lock.json 由本地 npm 11 维护，
          # npm 10（node 22）会因 @emnapi peer 依赖校验规则不同而报 lock 不同步。
          node-version: 24
          package-manager-cache: false

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

  server:
    name: Server (Express)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install deps
        run: npm ci

      - name: Typecheck (build)
        run: npm run build

      - name: Test
        run: npm test
