name: Mobile Build

# GitHub Actions 本地打 Android 包：
# - 普通移动端改动 push：构建 preview APK，只作为 artifact 保存，不发布。
# - v* tag：构建 production-apk，并发布到对应 GitHub Release。
# - 手动触发：可选择 preview / production 构建 artifact；只有在 v* tag 上运行才发布。
#
# 需要的 secret：EXPO_TOKEN（Expo 账号的 access token，用于读取 EAS 项目与签名凭据）。
on:
  push:
    branches: ["**"]
    tags: ["v*"]
    paths:
      - "app/**"
      - "src/**"
      - "assets/**"
      - "package.json"
      - "package-lock.json"
      - "app.json"
      - "app.config.*"
      - "eas.json"
      - ".github/workflows/eas-build.yml"
  workflow_dispatch:
    inputs:
      release_channel:
        description: 构建版本
        type: choice
        default: preview
        options: [preview, production]

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

env:
  R2_RELEASE_PREFIX: releases/android
  R2_RELEASE_KEEP: "5"

jobs:
  android:
    name: Android build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve build mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          channel="preview"
          publish="false"
          is_release_tag="false"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            channel="production"
            publish="true"
            is_release_tag="true"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.release_channel }}"
            publish="false"
            if [[ "$channel" == "production" && "$is_release_tag" == "true" ]]; then
              publish="true"
            fi
          fi

          profile="preview"
          if [[ "$channel" == "production" ]]; then
            profile="production-apk"
          fi

          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "artifact_name=mobile-${channel}-${safe_ref}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # 缓存 ~/.npm，省掉每次重新下载依赖（配合 package-lock.json 做 key）。
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      # 缓存全局 Gradle 目录：依赖 jar、wrapper、编译缓存都在这里。
      # android/ 工程每次 prebuild 重新生成，所以只能缓存全局 ~/.gradle，
      # 用 package-lock.json 做 key（依赖决定了要编译哪些原生模块）。
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 全局 gradle.properties：开并行 + 构建缓存 + 加大堆内存。
      # 写在 ~/.gradle 下，因为 prebuild 生成的 android/ 工程内改不了。
      - name: Tune Gradle
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g
          EOF

      - name: Install deps
        run: npm ci

      - name: Check Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::Missing EXPO_TOKEN secret. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android locally
        env:
          EAS_LOCAL_BUILD_ARTIFACTS_DIR: ${{ github.workspace }}/artifacts/mobile
        run: |
          mkdir -p "$EAS_LOCAL_BUILD_ARTIFACTS_DIR"
          eas build --local --non-interactive --platform android --profile "${{ steps.mode.outputs.profile }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.mode.outputs.artifact_name }}
          path: artifacts/mobile/*
          if-no-files-found: error

      - name: Publish production release
        if: steps.mode.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Automated production mobile build for ${GITHUB_SHA}."
          fi
          gh release upload "$tag" artifacts/mobile/* --clobber

      - name: Mirror production APK to R2
        if: steps.mode.outputs.publish == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ vars.R2_PUBLIC_BASE }}
          R2_RELEASE_PREFIX_OVERRIDE: ${{ vars.R2_RELEASE_PREFIX }}
          R2_RELEASE_KEEP_OVERRIDE: ${{ vars.R2_RELEASE_KEEP }}
        run: |
          set -euo pipefail

          missing=()
          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_BUCKET R2_PUBLIC_BASE; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing R2 release config: ${missing[*]}"
            exit 1
          fi

          apk="$(find artifacts/mobile -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk" ]; then
            echo "::error::No APK found under artifacts/mobile."
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          prefix="${R2_RELEASE_PREFIX_OVERRIDE:-$R2_RELEASE_PREFIX}"
          prefix="${prefix%/}"
          keep="${R2_RELEASE_KEEP_OVERRIDE:-$R2_RELEASE_KEEP}"
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          object_key="${prefix}/${tag}/app.apk"
          manifest_key="${prefix}/latest.json"
          public_base="${R2_PUBLIC_BASE%/}"
          manifest_path="artifacts/mobile/latest.json"

          export UPDATE_VERSION="$version"
          export UPDATE_DOWNLOAD_URL="${public_base}/${object_key}"
          export UPDATE_SHA256="$(sha256sum "$apk" | awk '{print $1}')"
          export UPDATE_SIZE_BYTES="$(wc -c < "$apk" | tr -d ' ')"
          export UPDATE_NOTES="Android ${tag} production build for ${GITHUB_SHA}."
          export UPDATE_MANIFEST_PATH="$manifest_path"
          node <<'NODE'
          const fs = require("node:fs");
          const manifest = {
            platform: "android",
            version: process.env.UPDATE_VERSION,
            mandatory: false,
            releaseDate: new Date().toISOString(),
            notes: process.env.UPDATE_NOTES,
            downloadUrl: process.env.UPDATE_DOWNLOAD_URL,
            sha256: process.env.UPDATE_SHA256,
            sizeBytes: Number(process.env.UPDATE_SIZE_BYTES)
          };
          fs.writeFileSync(process.env.UPDATE_MANIFEST_PATH, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          aws --version
          aws s3 cp "$apk" "s3://${R2_BUCKET}/${object_key}" \
            --endpoint-url "$endpoint" \
            --content-type "application/vnd.android.package-archive"
          aws s3 cp "$manifest_path" "s3://${R2_BUCKET}/${manifest_key}" \
            --endpoint-url "$endpoint" \
            --content-type "application/json" \
            --cache-control "no-cache"

          mapfile -t release_dirs < <(
            aws s3 ls "s3://${R2_BUCKET}/${prefix}/" --endpoint-url "$endpoint" \
              | awk '/PRE v/ { gsub("/", "", $2); print $2 }' \
              | sort -Vr
          )

          if [ "${#release_dirs[@]}" -gt "$keep" ]; then
            for old_tag in "${release_dirs[@]:$keep}"; do
              aws s3 rm "s3://${R2_BUCKET}/${prefix}/${old_tag}/" --recursive --endpoint-url "$endpoint"
            done
          fi

          echo "Mirrored ${tag} to ${UPDATE_DOWNLOAD_URL}"
