name: Server Build & Deploy

# GitHub Actions 服务端打包：
# - 普通 server 改动 push：构建 preview Docker 镜像 tar，只作为 artifact 保存，不发布。
# - v* tag：构建 production Docker 镜像并推送 GHCR，然后部署到服务器。
# - 手动触发：可选择 preview / production；production + deploy=true 时推送 GHCR 并部署。
#
# production 需要的 secrets：SSH_PRIVATE_KEY、SSH_HOST、SSH_USER。
# 部署不再在远端 docker build（避免服务器拉 Docker Hub 失败），改为 CI 推镜像后 scp/load 到服务器。
on:
  push:
    branches: ["**"]
    tags: ["v*"]
    paths:
      - "server/**"
      - ".github/workflows/cd-server.yml"
  workflow_dispatch:
    inputs:
      release_channel:
        description: 构建版本
        type: choice
        default: preview
        options: [preview, production]
      deploy:
        description: production 时是否部署到服务器
        type: boolean
        default: false

concurrency:
  group: server-build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/chengsoon/daily-habit-checkin/habit-server

jobs:
  build-image:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      channel: ${{ steps.mode.outputs.channel }}
      publish: ${{ steps.mode.outputs.publish }}
      image_tag: ${{ steps.mode.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Resolve build mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          channel="preview"
          publish="false"
          is_release_tag="false"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            channel="production"
            publish="true"
            is_release_tag="true"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.release_channel }}"
            publish="false"
            # 手动 production + deploy=true：推 GHCR 并部署（用 production/latest 标签）
            if [[ "$channel" == "production" && "${{ inputs.deploy }}" == "true" ]]; then
              publish="true"
            fi
          fi

          # 远端部署时拉取的镜像标签：tag 发版用 v*，手动部署用 production
          if [[ "$is_release_tag" == "true" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          else
            image_tag="production"
          fi

          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "artifact_name=server-${channel}-${safe_ref}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact directory
        if: steps.mode.outputs.publish != 'true'
        run: mkdir -p artifacts/server

      - name: Build image artifact
        if: steps.mode.outputs.publish != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: false
          tags: ${{ env.IMAGE }}:${{ steps.mode.outputs.channel }}-${{ github.sha }}
          outputs: type=docker,dest=artifacts/server/habit-server-${{ steps.mode.outputs.channel }}-${{ github.sha }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        if: steps.mode.outputs.publish != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.mode.outputs.artifact_name }}
          path: artifacts/server/*
          if-no-files-found: error

      - name: Log in to GHCR
        if: steps.mode.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish production image
        if: steps.mode.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:production
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy production server
    runs-on: ubuntu-latest
    needs: build-image
    if: needs.build-image.outputs.publish == 'true'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy (GHCR image load on server -> restart app)
        env:
          HOST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR || '/root/habit-server' }}
          IMAGE_REF: ${{ env.IMAGE }}:${{ needs.build-image.outputs.image_tag }}
        run: |
          set -euo pipefail
          echo "Deploy image: $IMAGE_REF"
          docker pull "$IMAGE_REF"

          # 同步 compose 配置（不在远端 build，避免 Docker Hub 拉 node 基础镜像失败）
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" "mkdir -p '$REMOTE_DIR'"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            server/docker-compose.yml \
            "$HOST:$REMOTE_DIR/docker-compose.yml"

          # 1) 传镜像到服务器（不依赖服务器访问 Docker Hub / GHCR）
          docker save "$IMAGE_REF" | gzip | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" "gunzip | docker load"

          # 2) 写 compose override 并重启 app
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" \
            "REMOTE_DIR=$(printf %q "$REMOTE_DIR") IMAGE_REF=$(printf %q "$IMAGE_REF") bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$REMOTE_DIR"
          if [ ! -f .env ]; then
            echo "Missing server env file: expected ${REMOTE_DIR}/.env" >&2
            exit 1
          fi
          printf '%s\n' \
            'services:' \
            '  app:' \
            "    image: ${IMAGE_REF}" \
            '    pull_policy: never' \
            > docker-compose.override.yml
          echo "Using server env file: .env"
          echo "Image: ${IMAGE_REF}"
          docker compose --env-file .env up -d --no-deps --no-build --force-recreate app
          docker compose --env-file .env ps
          REMOTE

      # 经 SSH 在服务器本机探活，避免 GitHub Runner 被防火墙/未开放端口拦住
      # （对外 :4000/habit/health 依赖 nginx 公网可达，CI 常得到 http_code=000）
      - name: Health check
        env:
          HOST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR || '/root/habit-server' }}
        run: |
          set -euo pipefail
          cat > /tmp/habit-health-remote.sh <<'REMOTE'
          set -euo pipefail
          cd "$REMOTE_DIR"
          APP_PORT="$(grep -E '^APP_PORT=' .env 2>/dev/null | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'" || true)"
          APP_PORT="${APP_PORT:-8787}"

          host_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://127.0.0.1:${APP_PORT}/health" || true)
          if [ "$host_code" = "200" ]; then
            echo "$host_code"
            exit 0
          fi

          container_code=$(docker compose --env-file .env exec -T app node -e "require('http').get('http://127.0.0.1:8787/health',r=>{process.stdout.write(String(r.statusCode));process.exit(0)}).on('error',()=>{process.stdout.write('000');process.exit(0)})" 2>/dev/null || true)
          if [ "$container_code" = "200" ]; then
            echo "$container_code"
            exit 0
          fi

          echo "${host_code:-000}/${container_code:-000}"
          exit 1
          REMOTE

          code=""
          for i in 1 2 3 4 5 6; do
            code=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" \
              "REMOTE_DIR=$(printf %q "$REMOTE_DIR") bash -s" < /tmp/habit-health-remote.sh || true)
            code=$(printf '%s\n' "$code" | tail -n 1 | tr -d '\r')
            if [ "$code" = "200" ]; then
              echo "部署成功，健康检查 200（SSH 本机探活）"
              exit 0
            fi
            echo "attempt $i/6: code=$code，等待重试…"
            sleep 5
          done

          echo "::error::健康检查未返回 200（实际：${code:-000}）"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" \
            "cd $(printf %q "$REMOTE_DIR") && docker compose --env-file .env ps && docker compose --env-file .env logs --tail=80 app" || true
          exit 1
