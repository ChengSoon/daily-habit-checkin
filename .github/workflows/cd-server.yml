name: Server Build & Deploy

# GitHub Actions 服务端打包：
# - 普通 server 改动 push：构建 preview Docker 镜像 tar，只作为 artifact 保存，不发布。
# - v* tag：构建 production Docker 镜像并推送 GHCR，然后部署到服务器。
# - 手动触发：可选择 preview / production 构建 artifact；只有 v* tag 才推送和部署。
#
# production 需要的 secrets：SSH_PRIVATE_KEY、SSH_HOST、SSH_USER。
on:
  push:
    branches: ["**"]
    tags: ["v*"]
    paths:
      - "server/**"
      - ".github/workflows/cd-server.yml"
  workflow_dispatch:
    inputs:
      release_channel:
        description: 构建版本
        type: choice
        default: preview
        options: [preview, production]

concurrency:
  group: server-build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/chengsoon/daily-habit-checkin/habit-server

jobs:
  build-image:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      channel: ${{ steps.mode.outputs.channel }}
      publish: ${{ steps.mode.outputs.publish }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Resolve build mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          channel="preview"
          publish="false"
          is_release_tag="false"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            channel="production"
            publish="true"
            is_release_tag="true"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.release_channel }}"
            publish="false"
            if [[ "$channel" == "production" && "$is_release_tag" == "true" ]]; then
              publish="true"
            fi
          fi

          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "artifact_name=server-${channel}-${safe_ref}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact directory
        if: steps.mode.outputs.publish != 'true'
        run: mkdir -p artifacts/server

      - name: Build image artifact
        if: steps.mode.outputs.publish != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: false
          tags: ${{ env.IMAGE }}:${{ steps.mode.outputs.channel }}-${{ github.sha }}
          outputs: type=docker,dest=artifacts/server/habit-server-${{ steps.mode.outputs.channel }}-${{ github.sha }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        if: steps.mode.outputs.publish != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.mode.outputs.artifact_name }}
          path: artifacts/server/*
          if-no-files-found: error

      - name: Log in to GHCR
        if: steps.mode.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish production image
        if: steps.mode.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:production
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy production server
    runs-on: ubuntu-latest
    needs: build-image
    if: needs.build-image.outputs.publish == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy (tar source -> remote build -> restart app)
        env:
          HOST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR || '/opt/daily-habit-server' }}
          APP_ENV: production
          SELECT_ENV_ALLOW_PROCESS_OVERRIDES: "1"
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          API_KEY: ${{ secrets.API_KEY }}
          RATE_LIMIT_MAX: ${{ vars.RATE_LIMIT_MAX }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          APP_UPDATE_MANIFEST_URL: ${{ vars.APP_UPDATE_MANIFEST_URL }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/server-env
          node scripts/select-env.cjs > artifacts/server-env/.env
          tar czf - --exclude='._*' --exclude='.DS_Store' \
            -C artifacts/server-env .env \
            -C server src Dockerfile package.json package-lock.json tsconfig.json docker-compose.yml \
            | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" "
                set -e
                mkdir -p '$REMOTE_DIR'
                tar xzf - -C '$REMOTE_DIR'
                cd '$REMOTE_DIR'
                docker compose build app
                docker compose up -d --no-deps app
                docker compose ps
              "

      - name: Health check
        env:
          HEALTH_URL: http://${{ secrets.SSH_HOST }}:4000/habit/health
        run: |
          set -euo pipefail
          sleep 3
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$HEALTH_URL" || true)
          if [ "$code" = "200" ]; then
            echo "部署成功，健康检查 200：$HEALTH_URL"
          else
            echo "::error::健康检查未返回 200（实际：$code）"
            exit 1
          fi
