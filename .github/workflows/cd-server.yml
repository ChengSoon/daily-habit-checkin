name: Server Build & Deploy

# GitHub Actions 服务端打包：
# - 普通 server 改动 push：构建 preview Docker 镜像 tar，只作为 artifact 保存，不发布。
# - v* tag：构建 production Docker 镜像并推送 GHCR，然后部署到服务器。
# - 手动触发：可选择 preview / production；production + deploy=true 时推送 GHCR 并部署。
#
# production 需要的 secrets：SSH_PRIVATE_KEY、SSH_HOST、SSH_USER。
# 部署策略（国内服务器友好）：
#   只传源码 tar（约几百 KB）→ 服务器本地 docker build → 重启 app。
#   默认使用 DaoCloud node 镜像 + npmmirror，避免 Docker Hub / GHCR 拉不动。
#   不再经 SSH 整包传输 Docker 镜像（曾耗时 1h+ 且易失败）。
on:
  push:
    branches: ["**"]
    tags: ["v*"]
    paths:
      - "server/**"
      - ".github/workflows/cd-server.yml"
  workflow_dispatch:
    inputs:
      release_channel:
        description: 构建版本
        type: choice
        default: preview
        options: [preview, production]
      deploy:
        description: production 时是否部署到服务器
        type: boolean
        default: false

concurrency:
  group: server-build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/chengsoon/daily-habit-checkin/habit-server

jobs:
  build-image:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      channel: ${{ steps.mode.outputs.channel }}
      publish: ${{ steps.mode.outputs.publish }}
      image_tag: ${{ steps.mode.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Resolve build mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          channel="preview"
          publish="false"
          is_release_tag="false"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            channel="production"
            publish="true"
            is_release_tag="true"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.release_channel }}"
            publish="false"
            # 手动 production + deploy=true：推 GHCR 并部署（用 production/latest 标签）
            if [[ "$channel" == "production" && "${{ inputs.deploy }}" == "true" ]]; then
              publish="true"
            fi
          fi

          # 远端部署时拉取的镜像标签：tag 发版用 v*，手动部署用 production
          if [[ "$is_release_tag" == "true" ]]; then
            image_tag="${GITHUB_REF_NAME}"
          else
            image_tag="production"
          fi

          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "artifact_name=server-${channel}-${safe_ref}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact directory
        if: steps.mode.outputs.publish != 'true'
        run: mkdir -p artifacts/server

      - name: Build image artifact
        if: steps.mode.outputs.publish != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: false
          tags: ${{ env.IMAGE }}:${{ steps.mode.outputs.channel }}-${{ github.sha }}
          outputs: type=docker,dest=artifacts/server/habit-server-${{ steps.mode.outputs.channel }}-${{ github.sha }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        if: steps.mode.outputs.publish != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.mode.outputs.artifact_name }}
          path: artifacts/server/*
          if-no-files-found: error

      - name: Log in to GHCR
        if: steps.mode.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish production image
        if: steps.mode.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:production
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy production server
    runs-on: ubuntu-latest
    needs: build-image
    if: needs.build-image.outputs.publish == 'true'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # 国内加速：只传源码 tar → 服务器 DaoCloud/npmmirror 本地 build
      # 不再 docker save|gzip|ssh|load 整包镜像（曾 1h+ 且失败）
      - name: Deploy (tar source + remote CN-mirror build)
        env:
          HOST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR || '/root/habit-server' }}
          NODE_IMAGE: ${{ vars.DEPLOY_NODE_IMAGE || 'docker.m.daocloud.io/library/node:22-alpine' }}
          NPM_REGISTRY: ${{ vars.DEPLOY_NPM_REGISTRY || 'https://registry.npmmirror.com' }}
        run: |
          set -euo pipefail
          echo "Remote dir: $REMOTE_DIR"
          echo "NODE_IMAGE=$NODE_IMAGE"
          echo "NPM_REGISTRY=$NPM_REGISTRY"

          STAGE=$(mktemp -d)
          trap 'rm -rf "$STAGE"' EXIT
          cp -R server/src server/Dockerfile server/package.json server/package-lock.json \
            server/tsconfig.json server/docker-compose.yml \
            server/scripts/remote-deploy.sh server/scripts/remote-health.sh \
            "$STAGE/"
          tar czf "$STAGE/src.tgz" -C "$STAGE" \
            src Dockerfile package.json package-lock.json tsconfig.json docker-compose.yml \
            remote-deploy.sh remote-health.sh

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" \
            "mkdir -p $(printf %q "$REMOTE_DIR")"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$STAGE/src.tgz" "$HOST:/tmp/habit-src.tgz"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" \
            env REMOTE_DIR="$REMOTE_DIR" NODE_IMAGE="$NODE_IMAGE" NPM_REGISTRY="$NPM_REGISTRY" \
            bash -c 'set -euo pipefail
              mkdir -p "$REMOTE_DIR"
              rm -rf "$REMOTE_DIR/src"
              tar xzf /tmp/habit-src.tgz -C "$REMOTE_DIR"
              chmod +x "$REMOTE_DIR/remote-deploy.sh" "$REMOTE_DIR/remote-health.sh"
              bash "$REMOTE_DIR/remote-deploy.sh"
              rm -f /tmp/habit-src.tgz'

      - name: Health check
        env:
          HOST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR || '/root/habit-server' }}
        run: |
          set -euo pipefail
          code=""
          for i in 1 2 3 4 5 6 7 8; do
            set +e
            out=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 -o ServerAliveInterval=5 \
              "$HOST" env REMOTE_DIR="$REMOTE_DIR" bash "$REMOTE_DIR/remote-health.sh" \
              2>/tmp/habit-health.err)
            rc=$?
            set -e
            code=$(printf '%s\n' "$out" | tail -n 1 | tr -d '\r')
            if [ "$code" = "200" ]; then
              echo "部署成功，健康检查 200（SSH 本机探活）"
              exit 0
            fi
            echo "attempt $i/8: code=${code:-empty} rc=$rc"
            if [ -s /tmp/habit-health.err ]; then
              echo "ssh/stderr: $(tail -c 400 /tmp/habit-health.err)"
            fi
            sleep 5
          done

          echo "::error::健康检查未返回 200（实际：${code:-empty}）"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" \
            "cd $(printf %q "$REMOTE_DIR") && docker compose --env-file .env ps && docker compose --env-file .env logs --tail=80 app" || true
          exit 1
