name: Cleanup Server Proxy

# 一次性运维：停掉服务器上的 sing-box / 系统代理，并回查状态。
# 不影响 habit-app / postgres / my-nginx。
on:
  workflow_dispatch:

concurrency:
  group: cleanup-server-proxy
  cancel-in-progress: false

jobs:
  cleanup:
    name: Stop proxies on server
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Cleanup proxies
        env:
          HOST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          echo "=== host ==="
          hostname; date; whoami

          echo "=== before: proxy-related processes ==="
          ps aux | grep -E 'sing-box|singbox|xray|v2ray|mihomo|clash|hysteria|s-ui|singbox' | grep -v grep || echo '(none)'

          echo "=== before: listening common proxy ports ==="
          ss -lntp 2>/dev/null | grep -E ':(1080|10808|7890|7891|2080|2081|2096|8443|2017|12345|4430|1087|10809)\b' || true
          netstat -lntp 2>/dev/null | grep -E ':(1080|10808|7890|7891|2080|2081|2096|2017)\b' || true

          echo "=== stop systemd units ==="
          for u in \
            sing-box singbox sing-box.service \
            xray v2ray mihomo clash hysteria \
            s-ui s-ui.service \
            hysteria-server hysteria2
          do
            systemctl stop "$u" 2>/dev/null || true
            systemctl disable "$u" 2>/dev/null || true
          done
          # any unit name containing these keywords
          systemctl list-unit-files --type=service --no-pager 2>/dev/null \
            | awk '{print $1}' \
            | grep -Ei 'sing-?box|xray|v2ray|mihomo|clash|hysteria|s-ui' \
            | while read -r u; do
                systemctl stop "$u" 2>/dev/null || true
                systemctl disable "$u" 2>/dev/null || true
                echo "stopped/disabled $u"
              done || true

          echo "=== kill leftover processes ==="
          pkill -9 -f 'sing-box' 2>/dev/null || true
          pkill -9 -f 'singbox' 2>/dev/null || true
          pkill -9 -f '/usr/local/bin/xray' 2>/dev/null || true
          pkill -9 -f 'xray run' 2>/dev/null || true
          pkill -9 -f 'v2ray' 2>/dev/null || true
          pkill -9 -f 'mihomo' 2>/dev/null || true
          pkill -9 -f 'hysteria' 2>/dev/null || true
          pkill -9 -f 'clash' 2>/dev/null || true

          echo "=== docker: do NOT touch habit-app/db/nginx ==="
          # only stop containers clearly named as proxy tools
          if command -v docker >/dev/null 2>&1; then
            docker ps -a --format '{{.ID}} {{.Names}} {{.Image}}' | while read -r id name image; do
              case "$name $image" in
                *sing-box*|*singbox*|*xray*|*v2ray*|*mihomo*|*clash*|*hysteria*|*s-ui*|*3x-ui*|*x-ui*)
                  echo "stopping docker $name ($image)"
                  docker stop "$id" 2>/dev/null || true
                  docker rm "$id" 2>/dev/null || true
                  ;;
              esac
            done
          fi

          echo "=== clear env proxy in root profiles (comment out, not delete whole file) ==="
          for f in /root/.bashrc /root/.profile /root/.zshrc /etc/environment /etc/profile; do
            if [ -f "$f" ]; then
              if grep -Eqi '^(export )?(all|http|https|no)_proxy=' "$f" 2>/dev/null; then
                cp -a "$f" "$f.bak.proxy-cleanup.$(date +%s)"
                sed -i -E 's/^(export )?(all|http|https|no)_proxy=/# cleared-by-proxy-cleanup: &/I' "$f" || true
                echo "sanitized $f"
              fi
            fi
          done

          # clear current session system-wide proxy files if present
          if [ -f /etc/profile.d/proxy.sh ]; then
            mv /etc/profile.d/proxy.sh /etc/profile.d/proxy.sh.disabled.$(date +%s) || true
            echo "disabled /etc/profile.d/proxy.sh"
          fi

          echo "=== after: processes ==="
          ps aux | grep -E 'sing-box|singbox|xray|v2ray|mihomo|clash|hysteria|s-ui' | grep -v grep || echo '(none)'

          echo "=== after: docker ps ==="
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' 2>/dev/null || true

          echo "=== after: listening ports of interest ==="
          ss -lntp 2>/dev/null | head -80 || netstat -lntp 2>/dev/null | head -80 || true

          echo "=== systemd remaining matching units ==="
          systemctl list-units --type=service --all --no-pager 2>/dev/null \
            | grep -Ei 'sing-?box|xray|v2ray|mihomo|clash|hysteria|s-ui' || echo '(none)'

          echo "CLEANUP_DONE"
          REMOTE
