      <rect x="34" y="711" width="322" height="62" rx="18" fill="#E86A92"/>
      <text x="58" y="738" font-size="14" font-weight="800" fill="#FFFFFF">击败奖励</text>
      <text x="58" y="759" font-size="12" font-weight="700" fill="#FFFFFF" opacity="0.82">150 积分 · 周挑战徽章 · 商城折扣券</text>
