<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7FB"/>
      <stop offset="0.54" stop-color="#FDF1F7"/>
      <stop offset="1" stop-color="#F8EDF9"/>
    </linearGradient>
    <linearGradient id="boss" x1="108" y1="126" x2="290" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F08DAD"/>
      <stop offset="0.48" stop-color="#E86A92"/>
      <stop offset="1" stop-color="#8B7BD8"/>
    </linearGradient>
    <linearGradient id="hp" x1="60" y1="375" x2="330" y2="375" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6C84C"/>
