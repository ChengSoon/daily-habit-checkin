    <text x="34" y="132" class="body">完成习惯造成伤害，周日结算战果</text>

    <g filter="url(#shadow)">
      <rect x="34" y="155" width="322" height="238" rx="22" fill="#2A1B24"/>
      <path d="M48 349C92 310 98 262 72 218C112 230 148 206 165 170C188 208 230 212 268 188C262 231 286 267 332 281C292 300 281 338 296 379C252 351 208 363 177 389C163 350 111 339 48 349Z" fill="#3B2430"/>
      <circle cx="196" cy="254" r="78" fill="url(#boss)"/>
      <path d="M143 215C154 180 181 166 196 166C211 166 238 180 249 215" stroke="#F6C84C" stroke-width="10" stroke-linecap="round"/>
      <circle cx="170" cy="245" r="9" fill="#FFFFFF"/>
      <circle cx="222" cy="245" r="9" fill="#FFFFFF"/>
      <circle cx="170" cy="245" r="4" fill="#2A1B24"/>
      <circle cx="222" cy="245" r="4" fill="#2A1B24"/>
      <path d="M172 285C186 298 206 298 220 285" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
