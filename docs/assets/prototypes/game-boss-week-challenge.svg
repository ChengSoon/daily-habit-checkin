      .title { font-size: 28px; font-weight: 800; fill: #2A1B24; }
      .section { font-size: 17px; font-weight: 800; fill: #2A1B24; }
      .body { font-size: 14px; font-weight: 600; fill: #5A4650; }
      .small { font-size: 12px; font-weight: 600; fill: #8B7681; }
      .tiny { font-size: 10px; font-weight: 700; fill: #8B7681; }
      .white { fill: #FFFFFF; }
      .primary { fill: #C24A73; }
      .partner { fill: #6A57BF; }
