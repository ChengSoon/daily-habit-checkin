plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.dailyhabitcheckin.getui'
version = '1.0.0'

android {
  namespace "expo.modules.getui"
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation 'com.getui:gtsdk:3.3.15.0'
  implementation 'com.getui:gtc:3.3.3.0'
}
